---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-gateway
---
apiVersion: v1
kind: Pod
metadata:
  name: http-echo
  namespace: demo-gateway
  labels:
    app: http-echo
spec:
  containers:
  - name: echo
    image: hashicorp/http-echo
    args:
      - "-text=Hello from Gateway API!"
    ports:
      - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: http-echo
  namespace: demo-gateway
spec:
  selector:
    app: http-echo
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5678
---
# Gateway definition
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: demo-gateway
  namespace: demo-gateway
spec:
  gatewayClassName: istio  # or nginx, or gke-l7-global-external-managed, depending on your cluster
  listeners:
  - name: http
    protocol: HTTP
    port: 80
---
# Route definition
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-route
  namespace: demo-gateway
spec:
  parentRefs:
  - name: demo-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: http-echo
      port: 80
